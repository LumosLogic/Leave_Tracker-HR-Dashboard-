# ─────────────────────────────────────────────────────────────
# Lumos HRMS — Nginx reverse proxy config
# Place in /etc/nginx/sites-available/ on the VPS
# Then: ln -s /etc/nginx/sites-available/lumos.conf /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain (e.g. hrms.sanghavi.com)
# SSL cert added automatically by: certbot --nginx -d YOUR_DOMAIN
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge (certbot uses this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS after cert is issued
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL — filled in by certbot automatically
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;   # allow file uploads up to 20MB

    # ── ZKTeco ADMS endpoints (biometric devices push here) ──
    # These must respond fast — device has 2s timeout
    location /iclock/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
    }

    # ── All other traffic → Node.js app ──────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
